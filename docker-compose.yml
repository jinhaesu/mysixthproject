version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
    volumes:
      # 영구 볼륨 - 컨테이너 재빌드/재시작 시에도 데이터 유지
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local
